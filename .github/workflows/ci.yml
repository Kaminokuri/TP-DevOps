name: Validate GitOps Project

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core checkov requests docker
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r configuration/ansible/requirements.yml

      - name: Terraform format
        run: terraform -chdir=infrastructure/terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform -chdir=infrastructure/terraform providers lock -platform=linux_amd64
          terraform -chdir=infrastructure/terraform init -backend=false
          terraform -chdir=infrastructure/terraform validate

      - name: Ansible syntax check
        run: ansible-playbook -i configuration/ansible/inventory.yml configuration/ansible/playbook.yml --syntax-check

      - name: Checkov scans
        run: |
          checkov -d infrastructure/terraform --framework terraform
          checkov -d configuration/ansible --framework ansible
          checkov -d application --framework dockerfile

      - name: Shell lint
        run: shellcheck scripts/*.sh
