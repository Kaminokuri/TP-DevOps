global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: jenkins
    metrics_path: /prometheus
    static_configs:
      - targets:
          - jenkins:8080

  - job_name: monitoring-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - monitoring-app:3001

