jenkins:
  systemMessage: "GitOps local pipeline configured as code."
  numExecutors: 2
  mode: NORMAL
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-Admin123!2026}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://localhost:8080/"

jobs:
  - script: >
      pipelineJob('gitops-local-pipeline') {
        description('Pipeline GitOps locale pour le TP DevOps')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('file:///workspace/tp-gitops-local')
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }
